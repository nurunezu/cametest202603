            'safety-block': { title: '安全ブロック', category: 'cat4', meta: '最後の砦', desc: '点検時にスライドの落下を防ぐために挿入する支柱。', pros: ['物理的な絶対安全'], cons: ['外し忘れによる事故'], logic: 'P.29: 万が一油圧が抜けても挟まれないよう、鉄の棒でスライドを支えます。', svg: `<svg viewBox="0 0 100 100"><rect x="42" y="35" width="16" height="40" fill="#f59e0b" stroke="#1e293b"/><rect x="42" y="35" width="16" height="5" fill="#ef4444"/></svg>` },

            // --- SECTION 5: PHYSICS ---
            'cavitation': { title: 'キャビテーション', category: 'cat5', meta: '油の泡爆弾', desc: '圧力低下で生じた気泡が弾けて、鉄を削り取る現象。', pros: ['なし'], cons: ['ポンプ破壊', '轟音'], logic: 'P.32: ポンプ吸い込み側のフィルタ詰まりや油温低下で発生しやすくなります。', svg: `<svg viewBox="0 0 100 100"><path d="M10 50 H90" stroke="#3b82f6" stroke-width="15" opacity="0.3"/><circle cx="30" cy="50" r="3" fill="#ffffff" stroke="#3b82f6"><animate attributeName="r" values="3;10;0" dur="0.5s" repeatCount="indefinite" /></circle></svg>` },
            'chattering': { title: 'チャタリング', category: 'cat5', meta: 'バルブの小刻みな震え', desc: 'バルブが弁座を叩いて高い音を発する自励振動現象。', pros: ['なし'], cons: ['機器寿命の短縮'], logic: 'P.32: 油温が高すぎたり、設定圧力が不適切だと「ビー」という音と共に発生します。', svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="10" class="danger-red"/><path d="M50 40 L50 60" stroke="white"><animateTransform attributeName="transform" type="translate" values="-2,0; 2,0; -2,0" dur="0.1s" repeatCount="indefinite"/></path></svg>` },
            'decompression': { title: 'デコンプレッション', category: 'cat5', meta: '深呼吸', desc: '高圧を抜く際に衝撃を防ぐため、ゆっくり圧を逃がす動作。', pros: ['配管の破裂防止', '静音'], cons: ['サイクル低下'], logic: 'P.32: これをサボると「ドカン」という音と共に配管が激しく揺れ、壊れます。', svg: `<svg viewBox="0 0 100 100"><path d="M10 20 L30 20 L60 80 L90 80" fill="none" stroke="#3b82f6" stroke-width="3"/><path d="M30 20 L35 80" stroke="#ef4444" stroke-dasharray="2"/></svg>` },
            'accumulator': { title: 'アキュムレータ', category: 'cat5', meta: '油圧のバッテリー', desc: '窒素ガスの反発を利用して油圧を溜めておく容器。', pros: ['瞬間パワー補助', '省エネ'], cons: ['ガス漏れ点検が必要'], logic: 'P.39: ポンプを助け、瞬間的に大きな流量を吐き出す「貯金箱」です。', svg: `<svg viewBox="0 0 100 100"><rect x="35" y="30" width="30" height="50" rx="15" class="press-gray" stroke="#1e293b"/><text x="50" y="45" text-anchor="middle" font-size="8">GAS</text><text x="50" y="70" text-anchor="middle" font-size="8" fill="#3b82f6">OIL</text></svg>` },

            // --- SECTION 6: CONTROL ---
            'relief-valve': { title: 'リリーフ弁', category: 'cat6', meta: 'ヤカンの笛', desc: '設定圧を超えた油をタンクに逃がす、回路の司令塔。', pros: ['爆発防止', '一定加圧'], cons: ['熱の発生'], logic: 'P.37: 最も重要な安全弁。これが壊れると配管やポンプが自爆します。', svg: `<svg viewBox="0 0 100 100"><path d="M20 50 H50 V10" fill="none" stroke="#1e293b" stroke-width="4"/><rect x="45" y="30" width="10" height="15" fill="#ef4444"><animate attributeName="y" values="30;15;30" dur="1s" repeatCount="indefinite" /></rect></svg>` },
            'prefill-valve': { title: 'プレフィル弁', category: 'cat6', meta: '大ジョッキ一気注ぎ', desc: 'スライド高速下降時に、頭上タンクから大流量を吸い込む弁。', pros: ['高速動作', '省エネ'], cons: ['動作時のショック'], logic: 'P.38: ポンプの力ではなく「重力」でドバドバと油を補充する巨大な弁です。', svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="20" r="15" fill="#3b82f6" opacity="0.3"/><path d="M50 20 V60" stroke="#3b82f6" stroke-width="15" stroke-linecap="round"><animate attributeName="stroke-width" values="15;25;15" dur="1.5s" repeatCount="indefinite" /></path></svg>` },
            'sequence-valve': { title: 'シーケンス弁', category: 'cat6', meta: '順番待ちのゲート', desc: '設定圧力に達するまで次の動作を許可しないバルブ。', pros: ['動作順序の厳守'], cons: ['調整ミスで止まる'], logic: 'P.37: 「固定が終わってから加圧する」といった段取りを自動で守らせます。', svg: `<svg viewBox="0 0 100 100"><rect x="20" y="40" width="20" height="10" class="press-dark"/><rect x="60" y="40" width="20" height="10" class="press-dark"/><path d="M40 45 H60" stroke="#ef4444" marker-end="url(#arrow)"/></svg>` },
            'solenoid-valve': { title: '電磁弁', category: 'cat6', meta: '電気のスイッチ', desc: '電気信号により油の通路を切り替える基本のバルブ。', pros: ['PLC制御可能'], cons: ['断線による停止'], logic: 'P.38: 現代の自動プレス機の動きはすべてこの電磁弁がコントロールしています。', svg: `<svg viewBox="0 0 100 100"><rect x="30" y="40" width="40" height="20" class="press-gray"/><rect x="70" y="45" width="15" height="10" fill="#f59e0b"/></svg>` }
        };

        function initGrid() {
            const container = document.getElementById('termGridContainer');
            const categories = [
                { id: 'cat1', name: '1. プレスの形態（種類）', color: 'blue' },
                { id: 'cat2', name: '2. 寸法とスペック（仕様）', color: 'emerald' },
                { id: 'cat3', name: '3. 操作と安全（運転）', color: 'amber' },
                { id: 'cat4', name: '4. 構造とパーツ（構成）', color: 'indigo' },
                { id: 'cat5', name: '5. 油圧の物理現象（トラブル）', color: 'rose' },
                { id: 'cat6', name: '6. 制御とバルブ（司令塔）', color: 'purple' }
            ];

            container.innerHTML = '';
            categories.forEach(cat => {
                let sectionHtml = `
                    <section id="${cat.id}">
                        <div class="category-header py-4 mb-8">
                            <h2 class="text-2xl font-bold text-${cat.color}-900 flex items-center gap-3">
                                <span class="w-1.5 h-6 bg-${cat.color}-600 rounded-full"></span>
                                ${cat.name}
                            </h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                `;

                const relevantTerms = Object.keys(termsData).filter(key => termsData[key].category === cat.id);
                relevantTerms.forEach(key => {
                    const data = termsData[key];
                    sectionHtml += `
                        <div class="term-card bg-white p-4 rounded-xl shadow-sm border border-slate-200" onclick="showModal('${key}')">
                            <div class="svg-container" id="svg-${key}">${data.svg}</div>
                            <h3 class="font-bold text-sm text-${cat.color}-700 mb-1">${data.title}</h3>
                            <div class="flex gap-2 mb-2"><span class="meta-badge">${data.meta}</span></div>
                            <p class="text-[8px] text-slate-500 leading-tight">${data.desc.substring(0, 45)}...</p>
                        </div>
                    `;
                });

                sectionHtml += `</div></section>`;
                container.innerHTML += sectionHtml;
            });
        }

        function showModal(id) {
            const data = termsData[id];
            if (!data) return;
            document.getElementById('modalCategory').innerText = data.category.replace('cat','SECTION ');
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalMeta').innerText = "たとえ：" + data.meta;
            document.getElementById('modalDesc').innerText = data.desc;
            document.getElementById('modalLogic').innerText = data.logic;
            document.getElementById('modalPros').innerHTML = data.pros.map(p => `<li>${p}</li>`).join('');
            document.getElementById('modalCons').innerHTML = data.cons.map(c => `<li>${c}</li>`).join('');
            document.getElementById('modalSvg').innerHTML = data.svg.replace('viewBox','width="160" height="160" viewBox');

            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.opacity = '1'; document.getElementById('modalContent').style.transform = 'scale(1)'; }, 10);
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            overlay.style.opacity = '0';
            document.getElementById('modalContent').style.transform = 'scale(0.9)';
            setTimeout(() => { overlay.style.display = 'none'; document.body.classList.remove('modal-open'); }, 300);
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 400) { btn.classList.remove('opacity-0', 'invisible'); btn.classList.add('opacity-100', 'visible'); }
            else { btn.classList.add('opacity-0', 'invisible'); btn.classList.remove('opacity-100', 'visible'); }
        });
        document.getElementById('backToTop').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        window.onload = initGrid;
    </script>
</body>
</html>
