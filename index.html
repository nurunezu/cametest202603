        /* カードのホバー演出 */

        .svg-container { background: #ffffff; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 15px; margin-bottom: 12px; min-height: 110px; border: 1px solid #e2e8f0; }

        .category-header { position: sticky; top: 0; z-index: 40; background: rgba(248, 250, 252, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; }
        
        /* モーダルのアニメーション */
        #modalOverlay { transition: opacity 0.3s ease; display: none; opacity: 0; }
        #modalContent { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); transform: scale(0.9); }
        body.modal-open { overflow: hidden; }

        .oil-blue { fill: #3b82f6; stroke: #2563eb; }

                cons: ['逃げる油が「熱」に変わるため、油温上昇の原因になる'],
                logic: '資料P.37：これが壊れると機械が自爆する恐れがあるため、最も信頼性が求められる部品です。',
                svg: `<svg viewBox="0 0 100 100"><path d="M20 50 H50 V10" fill="none" stroke="#1e293b" stroke-width="4"/><rect x="45" y="30" width="10" height="15" fill="#ef4444"><animate attributeName="y" values="30;15;30" dur="1s" repeatCount="indefinite" /></rect></svg>`
            },
            'prefill-valve': {
                title: 'プレフィル弁', category: '6. 制御とバルブ', meta: 'たとえ：大ジョッキへの一気注ぎ',
                desc: 'スライドが自重で高速下降する際、タンクから直接油を吸い込ませるための巨大なバルブ。',
                pros: ['スライドの高速化', 'ポンプを小型化できる'],
                cons: ['切り替え時にショックが発生しやすい'],
                logic: '資料P.38：ポンプでは供給が追いつかないほど速く動く時、重力を利用してドバドバと油を補充します。',
                svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="20" r="15" fill="#3b82f6" opacity="0.3"/><path d="M50 20 V60" stroke="#3b82f6" stroke-width="15" stroke-linecap="round"><animate attributeName="stroke-width" values="15;25;15" dur="1.5s" repeatCount="indefinite" /></path></svg>`
            }
        };

        // 資料にある用語リストをさらに追加（モーダルのみ対応する項目）
        const minorTerms = [
            { id: 'inching-op', title: '寸動運転', cat: 'cat3', desc: '手動でミリ単位の動作を行う運転モード。' },
            { id: 'single-cycle', title: '安全一行程', cat: 'cat3', desc: '1回操作すると1往復して必ず停止する安全な運転方法。' },
            { id: 'die-height', title: 'ダイハイト', cat: 'cat2', desc: 'スライド下死点でのスライド下面からボルスタ上面までの距離。' },
            { id: 'daylight', title: 'デーライト', cat: 'cat2', desc: 'オープンハイトと同じ意味。プレス内の有効空間。' },
            { id: 'gib', title: 'ギブ（スライドガイド）', cat: 'cat4', desc: 'スライドの摺動を案内するパーツ。精度を左右する。' },
            { id: 'bolster', title: 'ボルスタ', cat: 'cat4', desc: '金型を載せるための分厚い定盤。T形溝が彫られている。' },
            { id: 't-slot', title: 'T形溝', cat: 'cat4', desc: '金型を固定するボルトを差し込むためのT字型の溝。' },
            { id: 'decompression', title: 'デコンプレッション', cat: 'cat5', desc: '溜まった圧力をゆっくり抜く動作。サージ圧を防ぐ。' },
            { id: 'surge-pressure', title: 'サージ圧', cat: 'cat5', desc: '回路内の急激な圧力上昇。配管破壊の原因。' },
            { id: 'sequence-valve', title: 'シーケンス弁', cat: 'cat6', desc: '動作の順番（Aの次にB）を制御するためのバルブ。' },
            { id: 'counter-balance', title: 'カウンタバランス弁', cat: 'cat6', desc: 'おもりの落下を防ぐために背圧をかけるバルブ。' },
            { id: 'solenoid-valve', title: '電磁弁', cat: 'cat6', desc: '電気信号で油の流れを切り替えるバルブ。' }
        ];

        // グリッドの生成
        function initGrid() {
            const container = document.getElementById('termGridContainer');
            const categories = [
                { id: 'cat1', name: '1. プレスの形態', color: 'blue' },
                { id: 'cat2', name: '2. 寸法とスペック', color: 'emerald' },
                { id: 'cat3', name: '3. 操作と安全', color: 'amber' },
                { id: 'cat4', name: '4. 構造とパーツ', color: 'indigo' },
                { id: 'cat5', name: '5. 油圧の物理現象', color: 'rose' },
                { id: 'cat6', name: '6. 制御とバルブ', color: 'purple' }
            ];

            categories.forEach(cat => {
                let section = `
                    <section id="${cat.id}">
                        <div class="category-header py-4 mb-8">
                            <h2 class="text-2xl font-bold text-${cat.color}-900 flex items-center gap-3">
                                <span class="w-1.5 h-6 bg-${cat.color}-600 rounded-full"></span>
                                ${cat.name}
                            </h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                `;

                // 詳細データがあるカード
                Object.keys(termsData).filter(key => termsData[key].category.startsWith(cat.id.replace('cat',''))).forEach(key => {
                    const data = termsData[key];
                    section += `
                        <div class="term-card bg-white p-5 rounded-xl shadow-sm border border-slate-200" onclick="showModal('${key}')">
                            <div class="svg-container" id="svg-${key}">${data.svg}</div>
                            <h3 class="font-bold text-base text-${cat.color}-700 mb-1">${data.title}</h3>
                            <div class="flex gap-2 mb-2"><span class="meta-badge">${data.meta}</span></div>
                            <p class="text-[9px] text-slate-500 leading-tight">${data.desc.substring(0, 45)}...</p>
                        </div>
                    `;
                });

                // 詳細データがないマイナー用語
                minorTerms.filter(t => t.cat === cat.id).forEach(t => {
                    section += `
                        <div class="term-card bg-white p-4 rounded-xl shadow-sm border border-slate-100 border-dashed opacity-80" onclick="showSimpleModal('${t.title}', '${t.desc}')">
                            <div class="h-10 flex items-center justify-center text-slate-300">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                            </div>
                            <h3 class="font-bold text-xs text-slate-600">${t.title}</h3>
                            <p class="text-[8px] text-slate-400 mt-1 line-clamp-1">${t.desc}</p>
                        </div>
                    `;
                });

                section += `</div></section>`;
                container.innerHTML += section;
            });
        }

        // モーダル制御
        function showModal(id) {
            const data = termsData[id];
            if (!data) return;
            document.getElementById('modalCategory').innerText = data.category;
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalMeta').innerText = data.meta;
            document.getElementById('modalDesc').innerText = data.desc;
            document.getElementById('modalLogic').innerText = data.logic;
            document.getElementById('modalPros').innerHTML = data.pros.map(p => `<li>${p}</li>`).join('');
            document.getElementById('modalCons').innerHTML = data.cons.map(c => `<li>${c}</li>`).join('');
            document.getElementById('modalSvg').innerHTML = data.svg.replace('viewBox','width="180" height="180" viewBox');

            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.opacity = '1'; document.getElementById('modalContent').style.transform = 'scale(1)'; }, 10);
            document.body.classList.add('modal-open');
        }

        function showSimpleModal(title, desc) {
            // 簡易表示用
            const dummyData = { title, category: '用語解説', meta: '基本用語', desc, pros: ['資料の各ページを参照してください'], cons: ['なし'], logic: 'プレス作業の基本として重要な用語です。', svg: '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="#cbd5e1"/></svg>' };
            termsData['temp'] = dummyData;
            showModal('temp');
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            overlay.style.opacity = '0';
            document.getElementById('modalContent').style.transform = 'scale(0.9)';
            setTimeout(() => { overlay.style.display = 'none'; document.body.classList.remove('modal-open'); }, 300);
        }

        // 共通機能
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 400) { btn.classList.remove('opacity-0', 'invisible'); btn.classList.add('opacity-100', 'visible'); }
            else { btn.classList.add('opacity-0', 'invisible'); btn.classList.remove('opacity-100', 'visible'); }
        });
        document.getElementById('backToTop').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        // 初期化
        window.onload = initGrid;
    </script>
</body>
</html>
